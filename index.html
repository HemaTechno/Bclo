    // Load data from Firebase
    function loadSectionData(section) {
      const container = section === "scripts" ? scriptsContainer : (section === "executors" ? executorsContainer : appsContainer);
      if (!container) return;
      
      loadingIndicator.classList.remove("hidden");
      container.innerHTML = '<div class="col-span-full text-center py-10"><div class="spinner mx-auto"></div></div>';
      
      const itemsRef = database.ref(`content/${section}`);
      itemsRef.once("value", (snapshot) => {
        const items = snapshot.val() || {};
        renderItems(section, items);
        loadingIndicator.classList.add("hidden");
      }).catch(error => {
        console.error("Error loading data:", error);
        container.innerHTML = '<div class="col-span-full text-center text-red-500 py-10">حدث خطأ في تحميل البيانات</div>';
        loadingIndicator.classList.add("hidden");
      });
    }
    
    // Render items for a section
    function renderItems(section, items) {
      const container = section === "scripts" ? scriptsContainer : (section === "executors" ? executorsContainer : appsContainer);
      if (!container) return;
      
      const itemsArray = Object.entries(items).map(([id, data]) => ({ id, ...data }));
      if (itemsArray.length === 0) {
        container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10">لا توجد محتويات حالياً</div>';
        return;
      }
      
      container.innerHTML = itemsArray.map(item => `

            <i class="${item.icon || 'fas fa-cube'} text-3xl text-purple-500"></i>
            <h3 class="font-bold text-xl">${escapeHtml(item.title)}</h3>
            ${item.version ? `<span class="text-xs bg-gray-200 dark:bg-gray-700 px-2 py-1 rounded-full">${escapeHtml(item.version)}</span>` : ''}

          ${item.tags ? `<div class="my-2 flex flex-wrap gap-1">${item.tags.split(',').map(tag => `<span class="px-2 py-0.5 bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 rounded-full text-xs">${escapeHtml(tag.trim())}</span>`).join('')}</div>` : ''}

      // Add delete event listeners if admin
      if (isAdminLoggedIn) {

              database.ref(`content/${section}/${id}`).remove().then(() => {
                loadSectionData(section);
              }).catch(err => alert('خطأ في الحذف: ' + err.message));
            }
          });
        });
      }
    }
    
    // Add new item
    function addItem(section, itemData) {
      const newRef = database.ref(`content/${section}`).push();
      const newItem = {
        ...itemData,
        dateAdded: new Date().toLocaleDateString('ar-EG'),
        id: newRef.key
      };
      return newRef.set(newItem);
    }
    
    // Escape HTML
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    // Tab switching
    const tabBtns = document.querySelectorAll('.tab-btn');
    function switchTab(tabId) {
      currentSection = tabId;
      document.getElementById('scripts-section').classList.add('hidden');
      document.getElementById('executors-section').classList.add('hidden');
      document.getElementById('apps-section').classList.add('hidden');
      document.getElementById(`${tabId}-section`).classList.remove('hidden');
      
      tabBtns.forEach(btn => {
        if (btn.dataset.tab === tabId) {
          btn.classList.add('tab-active');
          btn.classList.remove('bg-white', 'dark:bg-gray-800', 'border');
        } else {
          btn.classList.remove('tab-active');
          btn.classList.add('bg-white', 'dark:bg-gray-800', 'border', 'border-gray-300');
        }
      });
      
      loadSectionData(tabId);

      en: { scripts_tab: "Scripts", executors_tab: "Executors", apps_tab: "Cracked Apps", menu: "Menu", scripts_nav: "Scripts", executors_nav: "Executors", apps_nav: "Cracked Apps" }

      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.querySelectorAll('[data-i18n]').forEach(el => {

    overlay?.addEventListener('click', closeMenu);
    document.querySelectorAll('.mobile-nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        switchTab(link.dataset.section);
        closeMenu();
      });
    });
    
    // Admin Panel
    const adminModal = document.getElementById('admin-modal');
    const adminBtn = document.getElementById('admin-btn');
    const adminLoginBtnMobile = document.getElementById('admin-login-btn-mobile');
    const closeAdminModal = document.getElementById('close-admin-modal');
    const adminLoginForm = document.getElementById('admin-login-form');
    const adminPanelContent = document.getElementById('admin-panel-content');
    const adminPasswordInput = document.getElementById('admin-password');
    const adminLoginSubmit = document.getElementById('admin-login-submit');
    const adminLogout = document.getElementById('admin-logout');
    const adminSectionSelect = document.getElementById('admin-section-select');
    const addItemBtn = document.getElementById('add-item-btn');
    const itemsList = document.getElementById('items-list');
    
    function openAdminModal() { adminModal.classList.add('active'); if (!isAdminLoggedIn) { adminLoginForm.classList.remove('hidden'); adminPanelContent.classList.add('hidden'); } else { adminLoginForm.classList.add('hidden'); adminPanelContent.classList.remove('hidden'); loadItemsList(); } }
    function closeAdminModalFunc() { adminModal.classList.remove('active'); }
    
    adminBtn?.addEventListener('click', openAdminModal);
    adminLoginBtnMobile?.addEventListener('click', openAdminModal);
    closeAdminModal?.addEventListener('click', closeAdminModalFunc);
    adminModal?.addEventListener('click', (e) => { if (e.target === adminModal) closeAdminModalFunc(); });
    
    adminLoginSubmit?.addEventListener('click', () => {
      const password = adminPasswordInput.value;
      if (password === ADMIN_PASSWORD) {
        isAdminLoggedIn = true;
        adminLoginForm.classList.add('hidden');
        adminPanelContent.classList.remove('hidden');
        loadItemsList();
        loadSectionData(currentSection);
      } else {
        alert('كلمة المرور غير صحيحة');
      }
    });
    
    adminLogout?.addEventListener('click', () => {
      isAdminLoggedIn = false;
      adminLoginForm.classList.remove('hidden');
      adminPanelContent.classList.add('hidden');
      adminPasswordInput.value = '';
      loadSectionData(currentSection);
    });
    
    function loadItemsList() {
      const section = adminSectionSelect.value;
      database.ref(`content/${section}`).once('value', (snapshot) => {
        const items = snapshot.val() || {};
        itemsList.innerHTML = Object.entries(items).map(([id, item]) => `
          <div class="flex justify-between items-center bg-gray-100 dark:bg-gray-800 p-2 rounded-lg">
            <span class="text-sm truncate flex-1">${escapeHtml(item.title)}</span>
            <button class="delete-admin-item bg-red-500 text-white px-2 py-1 rounded text-xs" data-id="${id}" data-section="${section}">حذف</button>
          </div>
        `).join('');
        
        document.querySelectorAll('.delete-admin-item').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.id;
            const section = btn.dataset.section;
            if (confirm('حذف هذا العنصر؟')) {
              database.ref(`content/${section}/${id}`).remove().then(() => {
                loadItemsList();
                loadSectionData(section);
              });
            }
          });
        });
      });
    }
    
    adminSectionSelect?.addEventListener('change', () => loadItemsList());
    
    addItemBtn?.addEventListener('click', () => {
      const section = adminSectionSelect.value;
      const title = document.getElementById('item-title').value.trim();
      const description = document.getElementById('item-description').value.trim();
      const icon = document.getElementById('item-icon').value.trim() || 'fas fa-cube';
      const tags = document.getElementById('item-tags').value.trim();
      const version = document.getElementById('item-version').value.trim();
      const downloadUrl = document.getElementById('item-download-url').value.trim();
      
      if (!title) {
        alert('الرجاء إدخال العنوان');
        return;
      }
      if (!downloadUrl) {
        alert('الرجاء إدخال رابط التحميل');
        return;
      }
      
      addItem(section, { title, description, icon, tags, version, downloadUrl }).then(() => {
        alert('تمت الإضافة بنجاح');
        document.getElementById('item-title').value = '';
        document.getElementById('item-description').value = '';
        document.getElementById('item-icon').value = '';
        document.getElementById('item-tags').value = '';
        document.getElementById('item-version').value = '';
        document.getElementById('item-download-url').value = '';
        loadItemsList();
        loadSectionData(section);
      }).catch(err => alert('خطأ: ' + err.message));
    });
    
    // Search functionality
    function filterItems(searchTerm) {
      const containers = [scriptsContainer, executorsContainer, appsContainer];
      containers.forEach(container => {
        if (!container) return;
        const cards = container.querySelectorAll('.ios-card');
        const term = searchTerm.toLowerCase().trim();
        cards.forEach(card => {
          const text = card.innerText.toLowerCase();
          if (term === '' || text.includes(term)) card.style.display = '';
          else card.style.display = 'none';
        });
      });
    }
    
    const searchInputs = document.querySelectorAll('input[type="text"]');
    searchInputs.forEach(input => {
      input.addEventListener('input', (e) => filterItems(e.target.value));
    });
    
    // Initial load
    loadSectionData('scripts');
    
    // Back to top button
    const backBtn = document.createElement('button');
    backBtn.innerHTML = '<i class="fas fa-arrow-up"></i>';
    backBtn.className = 'fixed bottom-4 left-4 w-10 h-10 gradient-bg text-white rounded-full shadow-lg hidden z-40';
    document.body.appendChild(backBtn);
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) backBtn.classList.remove('hidden');
      else backBtn.classList.add('hidden');
    });
    backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
</body>
</html>
